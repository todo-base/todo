[config]
default_to_workspace = false
additional_profiles = ["debug"]

[env]
RUST_BACKTRACE = 0

[tasks.choose_profile.env]
MODE = "release"
ADDITIONAL = "--release"

    [tasks.choose_profile.env.debug]
    MODE = "debug"
    ADDITIONAL = "--profile=dev"


[tasks.fmt-check]
toolchain = "nightly"
command = "cargo"
args = ["fmt", "--check"]

[tasks.fmt]
toolchain = "nightly"
command = "cargo"
args = ["fmt"]


[tasks.clippy]
toolchain = "stable"
command = "cargo"
args = ["clippy", "--all-targets", "--", "-D", "warnings"]

[tasks.test]
toolchain = "stable"
command = "cargo"
args = ["test", "--workspace"]

[tasks.lint]
dependencies = ["fmt-check", "clippy"]

[tasks.lint-test]
dependencies = ["lint", "test"]

[tasks.fmt-lint]
dependencies = ["fmt", "clippy"]

[tasks.fmt-lint-test]
dependencies = ["fmt-lint", "test"]
